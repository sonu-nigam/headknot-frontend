services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: app-production
            args:
                VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        ports:
            - '3000:80'
        environment:
            - NODE_ENV=production
            - API_BACKEND_URL=${API_BACKEND_URL:-https://api.headknot.app}
        restart: unless-stopped

    # Future: uncomment when apps/website exists
    # website:
    #     build:
    #         context: .
    #         dockerfile: Dockerfile
    #         target: website-production
    #     ports:
    #         - '3001:80'
    #     restart: unless-stopped

    # Optional: Add a development service
    app-dev:
        image: node:20-alpine
        working_dir: /app
        volumes:
            - .:/app
            - /app/node_modules
        ports:
            - '5173:5173'
        command: sh -c "corepack enable && corepack prepare pnpm@10.4.1 --activate && pnpm install && pnpm dev -- --host"
        environment:
            - NODE_ENV=development
        profiles:
            - dev
